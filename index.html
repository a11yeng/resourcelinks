<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource Links</title>
  <style>
    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin: 0 0 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
      margin: 0 auto;
      max-width: 650px;
    }

    .section-title {
      margin: 36px 0 16px;
      font-size: 1.3rem;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .card h2 {
      font-size: 1.2rem;
      margin: 0 0 8px;
    }

    .card p {
      color: var(--muted);
      margin: 0 0 18px;
    }

    .button {
      display: inline-block;
      background: var(--accent);
      color: white;
      text-decoration: none;
      padding: 11px 16px;
      border-radius: 999px;
      font-weight: 600;
    }

    .button:hover,
    .button:focus {
      background: var(--accent-dark);
      outline: 3px solid rgba(37, 99, 235, 0.25);
      outline-offset: 3px;
    }

    footer {
      margin-top: 48px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>

  <main class="page">
    <header>
